apiVersion: apps/v1
kind: Deployment
metadata:
  name: mango-gateway
spec:
  replicas: {{ .Values.replicaCount.gateway }}
  selector:
    matchLabels:
      app: mango-gateway
  template:
    metadata:
      labels:
        app: mango-gateway
    spec:
      containers:
        - name: gateway
          image: {{ .Values.image.repository }}/gateway:{{ .Values.image.tag }}
          ports:
            - containerPort: {{ .Values.service.gatewayPort }}
