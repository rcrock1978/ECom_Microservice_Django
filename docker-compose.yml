services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mango_dev
      POSTGRES_USER: mango
      POSTGRES_PASSWORD: mango_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: mango
      RABBITMQ_DEFAULT_PASS: mango_pass
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  auth-service:
    build:
      context: ./services/auth_service
    env_file:
      - ./services/auth_service/.env.example
    environment:
      DJANGO_SETTINGS_MODULE: auth_service.settings
      PYTHONPATH: /app:/app/shared:/workspace/services/email_service:/workspace/services/reward_service
    depends_on:
      - postgres
      - rabbitmq
      - redis
    ports:
      - "8001:8000"
    volumes:
      - ./shared:/app/shared:ro
      - ./services:/workspace/services:ro

  product-service:
    build:
      context: ./services/product_service
    env_file:
      - ./services/product_service/.env.example
    environment:
      DJANGO_SETTINGS_MODULE: product_service.settings
      PYTHONPATH: /app:/app/shared:/workspace/services/email_service:/workspace/services/reward_service
    depends_on:
      - postgres
      - rabbitmq
      - redis
    ports:
      - "8002:8000"
    volumes:
      - ./shared:/app/shared:ro
      - ./services:/workspace/services:ro

  cart-service:
    build:
      context: ./services/cart_service
    env_file:
      - ./services/cart_service/.env.example
    environment:
      DJANGO_SETTINGS_MODULE: cart_service.settings
      PYTHONPATH: /app:/app/shared:/workspace/services/email_service:/workspace/services/reward_service
    depends_on:
      - postgres
      - rabbitmq
      - redis
    ports:
      - "8003:8000"
    volumes:
      - ./shared:/app/shared:ro
      - ./services:/workspace/services:ro

  order-service:
    build:
      context: ./services/order_service
    env_file:
      - ./services/order_service/.env.example
    environment:
      DJANGO_SETTINGS_MODULE: order_service.settings
      PYTHONPATH: /app:/app/shared:/workspace/services/email_service:/workspace/services/reward_service
    depends_on:
      - postgres
      - rabbitmq
      - redis
    ports:
      - "8004:8000"
    volumes:
      - ./shared:/app/shared:ro
      - ./services:/workspace/services:ro

  coupon-service:
    build:
      context: ./services/coupon_service
    env_file:
      - ./services/coupon_service/.env.example
    environment:
      DJANGO_SETTINGS_MODULE: coupon_service.settings
      PYTHONPATH: /app:/app/shared:/workspace/services/email_service:/workspace/services/reward_service
    depends_on:
      - postgres
      - rabbitmq
      - redis
    ports:
      - "8005:8000"
    volumes:
      - ./shared:/app/shared:ro
      - ./services:/workspace/services:ro

  reward-service:
    build:
      context: ./services/reward_service
    env_file:
      - ./services/reward_service/.env.example
    environment:
      DJANGO_SETTINGS_MODULE: reward_service.settings
      PYTHONPATH: /app:/app/shared:/workspace/services/email_service:/workspace/services/reward_service
    depends_on:
      - postgres
      - rabbitmq
      - redis
    ports:
      - "8006:8000"
    volumes:
      - ./shared:/app/shared:ro
      - ./services:/workspace/services:ro

  email-service:
    build:
      context: ./services/email_service
    env_file:
      - ./services/email_service/.env.example
    environment:
      DJANGO_SETTINGS_MODULE: email_service.settings
      PYTHONPATH: /app:/app/shared:/workspace/services/email_service:/workspace/services/reward_service
    depends_on:
      - postgres
      - rabbitmq
      - redis
    ports:
      - "8007:8000"
    volumes:
      - ./shared:/app/shared:ro
      - ./services:/workspace/services:ro

  gateway:
    build:
      context: ./services/gateway
    env_file:
      - ./services/gateway/.env.example
    environment:
      DJANGO_SETTINGS_MODULE: gateway.settings
      PYTHONPATH: /app:/app/shared:/workspace/services/email_service:/workspace/services/reward_service
    depends_on:
      - auth-service
      - product-service
      - cart-service
      - order-service
      - coupon-service
      - reward-service
      - email-service
      - redis
    ports:
      - "8080:8000"
    volumes:
      - ./shared:/app/shared:ro
      - ./services:/workspace/services:ro

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - gateway
    ports:
      - "3000:3000"

volumes:
  postgres_data:
